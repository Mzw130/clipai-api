<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipAI 管理后台</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>

<!-- ==================== 登录页 ==================== -->
<div id="login-container">
  <div class="login-wrapper">
    <div class="login-bg-shape"></div>
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#8B5CF6" opacity="0.15"/>
            <path d="M24 12L32 20L24 28L16 20L24 12Z" fill="#8B5CF6" opacity="0.6"/>
            <path d="M24 28L32 20V32L24 36L16 32V20L24 28Z" fill="#8B5CF6"/>
          </svg>
        </div>
        <h1>Clip<span>AI</span></h1>
        <p>管理后台</p>
      </div>
      <div class="login-body">
        <form id="login-form" class="login-form" onsubmit="return false">
          <div class="input-group" id="phone-group">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>
            </span>
            <input type="tel" id="phone-input" placeholder="手机号" maxlength="11" autocomplete="tel" value="13800138000">
          </div>
          <div class="input-group" id="code-group">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input type="text" id="code-input" placeholder="验证码 (开发环境: 123456)" maxlength="6" autocomplete="one-time-code" value="123456">
            <button type="button" class="input-btn" id="send-code-btn">发送</button>
          </div>
          <button type="submit" class="login-btn" id="login-submit-btn" onclick="handleLogin()">
            <span id="login-btn-text">登 录</span>
            <svg id="login-spinner" class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:none"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          </button>
        </form>
      </div>
      <div class="login-footer">
        <p class="hint">开发环境默认验证码: <code>123456</code></p>
      </div>
    </div>
    <p class="login-copyright">&copy; 2026 ClipAI — 仅供管理员使用</p>
  </div>
</div>

<!-- ==================== 主界面 ==================== -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="logo">Clip<span>AI</span></div>
    <nav></nav>
    <div class="user-info">
      <div id="current-user-phone"></div>
      <span class="role" id="current-user-role">admin</span>
    </div>
    <button class="logout-btn">🚪 退出登录</button>
  </div>

  <!-- Main -->
  <div id="main-area">
    <div id="topbar" class="page-title">仪表盘</div>
    <div id="content"></div>
  </div>
</div>

<!-- ==================== Modal ==================== -->
<div id="modal-overlay" class="hidden">
  <div class="modal-box" id="modal-content"></div>
</div>

<!-- ==================== Toast ==================== -->
<div id="toast-container"></div>

<!-- Chart.js 异步加载，不阻塞页面渲染 -->
<script>
(function() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
  s.async = true;
  s.onerror = function() {
    // CDN 不可用时尝试备选
    var fallback = document.createElement('script');
    fallback.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    fallback.async = true;
    document.head.appendChild(fallback);
  };
  document.head.appendChild(s);
})();
</script>
<script src="/admin/js/api.js"></script>
<script src="/admin/js/components/toast.js"></script>
<script src="/admin/js/components/modal.js"></script>
<script src="/admin/js/components/table.js"></script>
<script src="/admin/js/components/sidebar.js"></script>
<script src="/admin/js/views/login.js"></script>
<script src="/admin/js/views/dashboard.js"></script>
<script src="/admin/js/views/users.js"></script>
<script src="/admin/js/views/tasks.js"></script>
<script src="/admin/js/views/subscriptions.js"></script>
<script src="/admin/js/views/models.js"></script>
<script src="/admin/js/views/analytics-tasks.js"></script>
<script src="/admin/js/views/analytics-trends.js"></script>
<script src="/admin/js/views/analytics-revenue.js"></script>
<script src="/admin/js/views/analytics-funnel.js"></script>
<script src="/admin/js/router.js"></script>

</body>
</html>
